<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurboV Bot Status</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent-color: #58a6ff;
      --accent-hover: #1f6feb;
      --online: #2ecc71;
      --starting: #f1c40f;
      --offline: #e74c3c;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: var(--card-bg);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .status-box {
      display: inline-flex;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid #30363d;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      margin-bottom: 1.5rem;
    }

    .dot {
      height: 12px;
      width: 12px;
      border-radius: 50%;
      margin-right: 10px;
      background-color: var(--offline);
      box-shadow: 0 0 10px var(--offline);
      transition: all 0.5s ease;
    }

    .dot.online {
      background-color: var(--online);
      box-shadow: 0 0 12px var(--online);
      animation: pulse 2s infinite;
    }

    .dot.starting {
      background-color: var(--starting);
      box-shadow: 0 0 12px var(--starting);
      animation: pulse 2s infinite;
    }

    .dot.offline {
      background-color: var(--offline);
      box-shadow: 0 0 12px var(--offline);
    }

    #status-text {
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .metrics-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background-color: rgba(255, 255, 255, 0.01);
      border: 1px solid #21262d;
      padding: 1.25rem;
      border-radius: 8px;
      margin-bottom: 2.5rem;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .metric-value {
      color: var(--text-main);
      font-family: monospace;
      font-size: 0.95rem;
    }

    #percentage-display {
      font-weight: bold;
    }

    .btn-main {
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
      padding: 0.85rem;
      background-color: var(--accent-color);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border-radius: 6px;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .btn-main:hover {
      background-color: var(--accent-hover);
    }

    .btn-main:active {
      transform: scale(0.98);
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>TurboV Bot Status</h1>
    <div class="subtitle">Live status directly from the node matrix</div>

    <!-- Status Indicator -->
    <div>
      <div class="status-box">
        <span id="status-dot" class="dot offline"></span>
        <span id="status-text">OFFLINE</span>
      </div>
    </div>

    <!-- Metrics Layout Block -->
    <div class="metrics-container">
      <div class="metric-row">
        <span>Current Session Uptime:</span>
        <span id="uptime-display" class="metric-value">0d 0h 0m 0s</span>
      </div>
      <div class="metric-row">
        <span>Historical Reliability:</span>
        <span id="percentage-display" class="metric-value" style="color: var(--online);">100.00%</span>
      </div>
    </div>

    <!-- Main Website Button -->
    <a href="https://www.turbov.dev" target="_blank" class="btn-main">Go to Main Website</a>
  </div>

  <script>
    const WORKER_URL = 'https://botstatus.randomthe1boy2.workers.dev';
    
    let uptimeMs = 0;
    let uptimeInterval;

    // Local Storage persistence keys for mathematical percentage tracking
    const STORAGE_KEY_ONLINE = 'turbov_total_online_slots';
    const STORAGE_KEY_TOTAL = 'turbov_total_checked_slots';

    function formatUptime(ms) {
      if (ms <= 0) return "0d 0h 0m 0s";
      const seconds = Math.floor((ms / 1000) % 60);
      const minutes = Math.floor((ms / (1000 * 60)) % 60);
      const hours = Math.floor((ms / (1000 * 60 * 60)) % 24);
      const days = Math.floor(ms / (1000 * 60 * 60 * 24));
      return `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    // Handles true percentage math calculation dynamically
    function recalculatePercentage(isOnline) {
      let totalOnline = parseInt(localStorage.getItem(STORAGE_KEY_ONLINE) || "0");
      let totalChecks = parseInt(localStorage.getItem(STORAGE_KEY_TOTAL) || "0");

      totalChecks += 1;
      if (isOnline) {
        totalOnline += 1;
      }

      localStorage.setItem(STORAGE_KEY_ONLINE, totalOnline.toString());
      localStorage.setItem(STORAGE_KEY_TOTAL, totalChecks.toString());

      const percentage = (totalOnline / totalChecks) * 100;
      const percentEl = document.getElementById('percentage-display');
      
      percentEl.innerText = percentage.toFixed(2) + "%";

      // Color shifts based on severity thresholds
      if (percentage >= 95) {
        percentEl.style.color = 'var(--online)';
      } else if (percentage >= 80) {
        percentEl.style.color = 'var(--starting)';
      } else {
        percentEl.style.color = 'var(--offline)';
      }
    }

    function startLocalUptimeTicker(initialMs) {
      clearInterval(uptimeInterval);
      uptimeMs = initialMs;
      
      document.getElementById('uptime-display').innerText = formatUptime(uptimeMs);
      
      uptimeInterval = setInterval(() => {
        uptimeMs += 1000;
        document.getElementById('uptime-display').innerText = formatUptime(uptimeMs);
      }, 1000);
    }

    async function checkBotStatus() {
      try {
        const response = await fetch(WORKER_URL);
        const textPayload = await response.text();
        let data;
        try {
          data = JSON.parse(textPayload);
        } catch(e) {
          throw new Error("Invalid backend JSON");
        }
        
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');

        dot.className = 'dot';

        if (data.state === 'running') {
          dot.classList.add('online');
          text.innerText = 'ONLINE';
          text.style.color = 'var(--online)';
          recalculatePercentage(true);
          
          if (data.uptime) {
            startLocalUptimeTicker(data.uptime);
          } else {
            document.getElementById('uptime-display').innerText = "Active";
          }
        } else if (data.state === 'starting') {
          dot.classList.add('starting');
          text.innerText = 'STARTING...';
          text.style.color = 'var(--starting)';
          recalculatePercentage(false);
          clearInterval(uptimeInterval);
          document.getElementById('uptime-display').innerText = "0d 0h 0m 0s";
        } else {
          dot.classList.add('offline');
          text.innerText = 'OFFLINE';
          text.style.color = 'var(--offline)';
          recalculatePercentage(false);
          clearInterval(uptimeInterval);
          document.getElementById('uptime-display').innerText = "0d 0h 0m 0s";
        }
      } catch (error) {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        dot.className = 'dot offline';
        text.innerText = 'OFFLINE';
        text.style.color = 'var(--offline)';
        recalculatePercentage(false);
        clearInterval(uptimeInterval);
        document.getElementById('uptime-display').innerText = "0d 0h 0m 0s";
      }
    }

    // Run health check immediately on load, update state cache every 30s
    checkBotStatus();
    setInterval(checkBotStatus, 30000);
  </script>
</body>
</html>
